version: '3.8'
services:
# frontend (Vite + React)
  frontend:
    build: ./perf-monitor-portlet
    container_name: perf-monitor-portlet
    ports:
      - "5175:5173"
    volumes:
      - ./perf-monitor-portlet:/app  
      - /app/node_modules 
    environment:
      - CHOKIDAR_USEPOLLING=true 

